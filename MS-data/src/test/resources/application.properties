# H2 in-memory para tests
spring.datasource.url=jdbc:h2:mem:testdb_data;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Kafka — no excluir (KafkaTemplate es requerido por DatoEventPublisher)
# El producer no conecta hasta que se llama send()
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false

# Deshabilitar Eureka/Discovery/Config
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
