# H2 in-memory para tests
spring.datasource.url=jdbc:h2:mem:testdb_kpi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Kafka — no excluir (KafkaTemplate requerido por KpiEventPublisher)
# listener.auto-startup=false evita que KpiEventConsumer intente conectar
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false

# Feign clients (URLs requeridas en la definicion del bean)
feign.client.data.url=http://localhost:8082

# Deshabilitar circuit breaker Feign en tests
feign.circuitbreaker.enabled=false

# Deshabilitar Eureka/Discovery/Config
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
